<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timeline Biblica</title>
  <link rel="icon" type="image/png" href="img/favicon.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="style/style.css">
  <link rel="stylesheet" href="style/timeline.css">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>

<body>
  <div class="container">
    <h1 class="page-title text-center m-4"><i class="bi bi-sort-alpha-down icon"></i> <span>Sequenza degli</span> <span
        class="accent">Eventi</span></h1>

    <p class="text-center text-white">
      Scegli una linea temporale e trascina gli eventi per metterli nell'ordine cronologico corretto.
    </p>

<div class="text-center mb-4" id="timelineControls" style="display:none;">
  <div class="timeline-actions mb-3">
    <button class="btn btn-change-timeline" onclick="riapriTimelineModal()">
      <i class="bi bi-arrow-repeat me-2"></i>
      <span>Cambia timeline</span>
    </button>

    <div class="timeline-main-actions">
      <button class="btn btn-next btn-verify-order" onclick="verificaTimeline()">
        <i class="bi bi-check2-circle me-2"></i>
        <span>Verifica</span>
      </button>

      <button class="btn btn-randomize btn-randomize-compact" onclick="caricaTimeline()" aria-label="Rimescola timeline" title="Rimescola">
        <i class="bi bi-shuffle"></i>
        <span class="btn-randomize-text">Rimescola</span>
      </button>
    </div>
  </div>
</div>

      <div id="timeline-feedback" class="mt-3"></div>
      <div id="timeline-reference" class="text-muted mt-1"></div>
    </div>

    <ul id="timeline-list" class="timeline-list"></ul>

    <div class="d-flex justify-content-center mt-4">
      <a href="index.html" class="btn btn-home btn-lg rounded-pill shadow px-4 py-2">
        <i class="bi bi-house me-2"></i>Home
      </a>
    </div>
  </div>

  <div class="modal fade" id="timelineModal" tabindex="-1" aria-labelledby="timelineModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm modal-quiz-start">
      <div class="modal-content quiz-start-modal border-0">
        <div class="modal-body p-4 p-md-5 text-center">
          <div class="quiz-start-badge mb-3">
            <i class="bi bi-diagram-3 me-2"></i>
            Selezione timeline
          </div>

          <h3 class="quiz-start-title mb-2" id="timelineModalLabel">
            Scegli una sequenza
          </h3>

          <p class="quiz-start-subtitle mb-4">
            Seleziona una timeline biblica da ordinare.
          </p>

          <div class="quiz-start-grid" id="timelineButtons">
            <div class="text-muted small">Caricamento timeline...</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let timelineData = {};
    let eventiCorretti = [];
    let riferimentoAttuale = "";
    let timelineAttuale = "";

    const lista = document.getElementById("timeline-list");
    const feedback = document.getElementById("timeline-feedback");
    const reference = document.getElementById("timeline-reference");
    const timelineControls = document.getElementById("timelineControls");
    const timelineButtons = document.getElementById("timelineButtons");

    new Sortable(lista, { animation: 150 });

    fetch(`data/timeline.json?ts=${Date.now()}`)
      .then(res => res.json())
      .then(data => {
        timelineData = data;
        popolaModalTimeline();

        const modalEl = document.getElementById("timelineModal");
        const modal = new bootstrap.Modal(modalEl);
        modal.show();
      })
      .catch(err => {
        console.error("Errore nel caricamento della timeline:", err);
        feedback.innerHTML = "<div class='alert alert-danger'>Errore nel caricamento delle timeline.</div>";
      });

    function formattaTitoloTimeline(chiave) {
      return chiave
        .replace(/_/g, " ")
        .replace(/\b\w/g, l => l.toUpperCase());
    }

    function popolaModalTimeline() {
      timelineButtons.innerHTML = "";

      Object.entries(timelineData).forEach(([chiave], index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = index === 0
          ? "quiz-count-btn quiz-count-btn-featured"
          : "quiz-count-btn";

        button.innerHTML = `
  <span class="quiz-count-number">
    <i class="bi bi-clock-history"></i>
  </span>
  <span class="quiz-count-label">${formattaTitoloTimeline(chiave)}</span>
`;

        button.addEventListener("click", () => startTimeline(chiave));
        timelineButtons.appendChild(button);
      });
    }

    function mescola(array) {
      return array.slice().sort(() => Math.random() - 0.5);
    }

    function caricaTimeline() {
      if (!timelineAttuale || !timelineData[timelineAttuale]) return;

      const timeline = timelineData[timelineAttuale];
      eventiCorretti = [...timeline.eventi];
      riferimentoAttuale = timeline.riferimento || "";

      const mescolati = mescola(eventiCorretti);
      lista.innerHTML = "";

      mescolati.forEach(evento => {
        const li = document.createElement("li");
        li.textContent = evento;
        li.className = "timeline-item";
        lista.appendChild(li);
      });

      feedback.innerHTML = "";
      reference.textContent = "";
    }

    function startTimeline(chiave) {
      timelineAttuale = chiave;
      timelineControls.style.display = "block";
      caricaTimeline();

      const modalEl = document.getElementById("timelineModal");
      const modal = bootstrap.Modal.getInstance(modalEl);
      if (modal) modal.hide();
    }

    function riapriTimelineModal() {
      const modal = new bootstrap.Modal(document.getElementById("timelineModal"));
      modal.show();
    }

    function verificaTimeline() {
      const items = Array.from(lista.children);
      let corretti = 0;

      items.forEach((el, i) => {
        el.classList.remove("correct", "incorrect");

        if (el.textContent === eventiCorretti[i]) {
          el.classList.add("correct");
          corretti++;
        } else {
          el.classList.add("incorrect");
        }
      });

      feedback.innerHTML = corretti === eventiCorretti.length
        ? `<div class="alert alert-success">✅ Tutto in ordine!</div>`
        : `<div class="alert alert-warning">❌ ${eventiCorretti.length - corretti} errori. Gli eventi corretti sono evidenziati in verde.</div>`;

      reference.textContent = riferimentoAttuale;
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
